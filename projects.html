            async function fetchGitHubStars(repo) {
                try {
                    const response = await fetch(`https://api.github.com/repos/${repo}`);
                    if (!response.ok) return null;
                    const data = await response.json();
                    return data.stargazers_count;
                } catch (error) {

                }
            }

            async function loadGitHubStars() {
                const starElements = document.querySelectorAll('.github-stats');
                for (const el of starElements) {
                    const repo = el.closest('a').dataset.repo;
                    if (repo) {
                        const stars = await fetchGitHubStars(repo);
                        el.classList.remove('loading');
                        if (stars !== null && stars > 0) el.innerText = `(${stars} Stars)`;
                    }
                }
            }

            function renderProjects(projectsToRender = projects) {
                const grid = document.getElementById('projectsGrid');
                if (projectsToRender.length === 0) {
                    grid.innerHTML = `<p style="text-align:center; width:100%; color:#888; font-size:1.5rem; font-family:'Raleway', sans-serif;">No archive items found.</p>`;
                    return;
                }
                grid.innerHTML = projectsToRender.map(createProjectCard).join('');

                setTimeout(() => {
                    document.querySelectorAll('.project-row').forEach((row, i) => {
                        setTimeout(() => row.classList.add('visible'), i * 150);
                    });
                }, 50);

                loadGitHubStars();
            }

            function filterProjects() {
                const activeFilter = document.querySelector('.filter-btn.active').dataset.filter;
                const searchTerm = searchInput.value.toLowerCase();

                let filtered = projects;

                if (activeFilter !== 'all') {
                    filtered = filtered.filter(p => p.category.includes(activeFilter));
                }
                if (searchTerm) {
                    filtered = filtered.filter(p =>
                        p.title.toLowerCase().includes(searchTerm) ||
                        p.description.toLowerCase().includes(searchTerm) ||
                        p.techStack.some(t => t.toLowerCase().includes(searchTerm))
                    );
                }
                renderProjects(filtered);
            }

            filterButtons.addEventListener('click', (e) => {
                if (e.target.classList.contains('filter-btn')) {
                    document.querySelector('.filter-btn.active').classList.remove('active');
                    e.target.classList.add('active');
                    filterProjects();
                }
            });

            searchInput.addEventListener('input', filterProjects);

            renderProjects();
        });
    </script>
</body>

</html>
